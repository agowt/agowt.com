<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy-First Diff Checker | agowt.com</title>
    <meta name="description" content="A secure, client-side text and code comparison tool. Highlight differences instantly without uploading your sensitive data to a server.">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Diff2Html Default Styles -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css?v=2.6">
</head>
<body>
    <header class="app-masthead">
        <div class="masthead-top">
            <div class="logo">
                <h1 class="serif-masthead">agowt<span>diff</span></h1>
            </div>
        </div>
        <div class="masthead-bottom">
            <p>100% Local Text Comparison <span class="nav-divider">|</span> Zero Server Uploads <span class="nav-divider">|</span> Absolute Privacy</p>
        </div>
    </header>

    <main class="app-container">
        <div class="utility-bar">
            <button id="themeToggle" class="icon-btn theme-toggle-btn" title="Toggle Theme">
                <i class="ph ph-sun" id="themeIcon"></i>
            </button>
        </div>

        <div class="panel main-panel">
            <div class="input-grid">
                <div class="input-group">
                    <div class="input-header">
                        <i class="ph ph-file-dashed"></i>
                        <span>Original Text</span>
                        <button class="icon-btn clear-btn" data-target="originalText" title="Clear">
                            <i class="ph ph-trash"></i>
                        </button>
                    </div>
                    <textarea id="originalText" placeholder="Paste your original text or code here..."></textarea>
                </div>

                <div class="input-group">
                    <div class="input-header">
                        <i class="ph ph-file-text"></i>
                        <span>Modified Text</span>
                        <button class="icon-btn clear-btn" data-target="modifiedText" title="Clear">
                            <i class="ph ph-trash"></i>
                        </button>
                    </div>
                    <textarea id="modifiedText" placeholder="Paste your modified text or code here..."></textarea>
                </div>
            </div>
            
            <div class="action-bar">
                <div class="view-toggles">
                    <button class="btn btn-tab active" id="btnWrap" title="Wrap Text">
                        <i class="ph ph-text-wrap"></i> <span class="hide-mobile">Wrap Text</span>
                    </button>
                    <button class="btn btn-tab" id="btnNoWrap" title="No Wrap">
                        <i class="ph ph-arrows-out-line-horizontal"></i> <span class="hide-mobile">No Wrap</span>
                    </button>
                </div>

                <div class="view-toggles" style="margin-left: 1rem;">
                    <button class="btn btn-tab active" id="btnCodeFont" title="Code Font (Monospace)">
                        <i class="ph ph-code"></i> <span class="hide-mobile">Code Font</span>
                    </button>
                    <button class="btn btn-tab" id="btnDocFont" title="Document Font (Sans-Serif)">
                        <i class="ph ph-text-aa"></i> <span class="hide-mobile">Doc Font</span>
                    </button>
                </div>

                <div style="flex: 1;"></div>
                
                <button class="btn btn-tab" id="btnToggleInputs" style="margin-right: 1rem; display: none;" title="Toggle Inputs">
                    <i class="ph ph-arrows-in-line-vertical"></i> <span class="hide-mobile">Hide Inputs</span>
                </button>

                <div class="export-dropdown" id="exportDropdownContainer" style="display: none; position: relative; margin-right: 1rem;">
                    <button class="btn btn-secondary" id="btnExportMenu" style="display: flex; align-items: center; gap: 0.5rem;">
                        <i class="ph ph-export"></i> <span class="hide-mobile">Export</span> <i class="ph ph-caret-down"></i>
                    </button>
                    <div class="dropdown-content" id="exportMenuContent">
                        <button id="btnExportHTML"><i class="ph ph-file-html"></i> Export as Interactive HTML</button>
                        <button id="btnExportPDF"><i class="ph ph-file-pdf"></i> Export to PDF (Print)</button>
                        <button id="btnExportPatch"><i class="ph ph-file-code"></i> Export as Git Patch (.diff)</button>
                    </div>
                </div>

                <button id="compareBtn" class="btn btn-primary">
                    <i class="ph ph-arrows-left-right"></i> Compare Now
                </button>
            </div>
        </div>

        <section class="results-section hidden" id="resultsSection">
            <div class="panel diff-panel">
                <div id="diffOutput"></div>
            </div>
        </section>
    </main>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
    <script src="script.min.js?v=1.5"></script>
</body>
</html>
