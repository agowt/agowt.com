<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGOWT — Building with Purpose</title>
  <meta name="description" content="AGOWT builds purposeful tools and applications. Explore our products.">
  <meta property="og:title" content="AGOWT — Building with Purpose">
  <meta property="og:description" content="AGOWT builds purposeful tools and applications.">
  <meta property="og:url" content="https://agowt.com/">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://agowt.com/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0D0D0D;
      color: #FAF8F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .brand {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
    }
    .tagline {
      color: #B8B0A8;
      font-size: 1rem;
      font-weight: 400;
      margin-bottom: 3rem;
    }
    .products {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }
    .product-link {
      display: block;
      padding: 1.25rem 1.5rem;
      background: #1A1A1A;
      border: 1px solid rgba(200, 169, 81, 0.15);
      border-radius: 12px;
      color: #FAF8F5;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }
    .product-link:hover {
      border-color: #C8A951;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(200, 169, 81, 0.1);
    }
    .product-link .product-name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .product-link .product-desc {
      font-size: 0.85rem;
      color: #B8B0A8;
      font-weight: 400;
    }
    .footer {
      margin-top: 4rem;
      color: #6E6560;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1 class="brand">AGOWT</h1>
  <p class="tagline">Building with Purpose</p>

  <div class="products">
    <a href="/pmrdevotion/" class="product-link">
      <div class="product-name">PMR Devotion</div>
      <div class="product-desc">Pray. Meditate. Repeat. — A Scripture-rooted prayer app</div>
    </a>
  </div>

  <p class="footer">&copy; 2026 AGOWT. All rights reserved.</p>
</body>
</html>
